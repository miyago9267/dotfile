# =====================================
# Tmux 配置整合（Neovim + 滑鼠增強）
# =====================================

# ---------------------------------
# 基本設定
# ---------------------------------
# 啟用 256 色彩
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# 滑鼠支援
set -g mouse on

# 視窗和窗格編號從 1 開始（更直覺）
set -g base-index 1
setw -g pane-base-index 1

# 自動重新編號視窗
set -g renumber-windows on

# 加快指令序列速度
set -s escape-time 0

# 歷史記錄行數
set -g history-limit 50000

# ---------------------------------
# 滑鼠增強操作
# ---------------------------------
# 滾輪捲動：非 copy-mode 時自動進入後捲動
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# 雙擊選字
bind -n DoubleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel

# 三擊選行
bind -n TripleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel

# 中鍵貼上
bind -n MouseDown2Pane paste-buffer

# 右鍵選單（Pane 上）
bind -n MouseDown3Pane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "display-menu -T '#[align=centre]#{pane_index} (#{pane_id})' -t = -x M -y M \
  '#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Top,}' < 'send-keys -X history-top' \
  '#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Bottom,}' > 'send-keys -X history-bottom' \
  '' \
  'Horizontal Split' h 'split-window -v -c \"#{pane_current_path}\"' \
  'Vertical Split' v 'split-window -h -c \"#{pane_current_path}\"' \
  '' \
  'Swap Up' u 'swap-pane -U' \
  'Swap Down' d 'swap-pane -D' \
  '' \
  '#{?pane_marked_set,,-}Swap Marked' s swap-pane \
  'Toggle Zoom' z 'resize-pane -Z' \
  '#{?#{==:#{window_panes},1},,-}Toggle Sync' S 'setw synchronize-panes' \
  '' \
  'Kill Pane' X kill-pane \
  'Respawn Pane' R 'respawn-pane -k'"

# 右鍵選單（視窗狀態列上）
bind -n MouseDown3Status display-menu -T "#[align=centre]#{window_index}:#{window_name}" -t = -x W -y S \
  'Swap Left' l 'swap-window -t:-1' \
  'Swap Right' r 'swap-window -t:+1' \
  '#{?pane_marked_set,,-}Swap Marked' s swap-window \
  '' \
  'Rename' n 'command-prompt -I "#W" "rename-window -- \"%%\""' \
  'Kill' X kill-window \
  '' \
  'New After' w 'new-window -a -c "#{pane_current_path}"' \
  'New At End' W 'new-window -c "#{pane_current_path}"'

# ---------------------------------
# vim-tmux-navigator 整合
# ---------------------------------
# 讓 Neovim 和 tmux 窗格間用相同的快捷鍵切換
# 需要在 Neovim 中安裝 christoomey/vim-tmux-navigator

# 判斷是否在 Vim/Neovim 中
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

# 使用 C-h/j/k/l 在窗格間切換（與 Vim 相同）
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# tmux 3.x 版本的語法
if-shell -b 'tmux_version=$(tmux -V | sed -En "s/^tmux ([0-9]+(\\.[0-9]+)?).*/\\1/p"); [ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b 'tmux_version=$(tmux -V | sed -En "s/^tmux ([0-9]+(\\.[0-9]+)?).*/\\1/p"); [ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# 在 copy-mode-vi 模式下也能使用
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# ---------------------------------
# 分割窗格快捷鍵
# ---------------------------------
# | 垂直分割（左右分割）
bind | split-window -h -c "#{pane_current_path}"
# _ 水平分割（上下分割）
bind _ split-window -v -c "#{pane_current_path}"

# \ 垂直分割且寬度為 25%
bind \\ split-window -h -l 25% -c "#{pane_current_path}"
# - 水平分割且高度為 25%
bind - split-window -v -l 25% -c "#{pane_current_path}"

# ---------------------------------
# 彈出式終端機
# ---------------------------------
# <prefix> + t: 開啟彈出式終端
bind t display-popup -E -w 90% -h 90% -d "#{pane_current_path}"

# ---------------------------------
# 視窗管理
# ---------------------------------
# 快速切換到上一個視窗
bind Space last-window

# 創建新視窗時保持當前路徑
bind c new-window -c "#{pane_current_path}"

# ---------------------------------
# 窗格調整大小
# ---------------------------------
# 使用 prefix + H/J/K/L 調整窗格大小（大幅度）
# 拖拽 pane 邊框也可調整大小（mouse on 內建支援）
bind H resize-pane -L 10
bind J resize-pane -D 10
bind K resize-pane -U 10
bind L resize-pane -R 10

# 使用 prefix + h/j/k/l 微調窗格大小
bind h resize-pane -L 2
bind j resize-pane -D 2
bind k resize-pane -U 2
bind l resize-pane -R 2

# ---------------------------------
# 複製模式（Vi 風格）
# ---------------------------------
# 使用 Vi 模式
setw -g mode-keys vi

# v 開始選擇，y 複製（類似 Vim）
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# macOS 系統剪貼簿整合
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'"

# Linux 系統剪貼簿整合（需要 xclip）
if-shell "uname | grep -q Linux" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# ---------------------------------
# 重新載入配置
# ---------------------------------
# <prefix> + r: 重新載入 tmux 配置
bind r source-file ~/.tmux.conf \; display "配置已重新載入！"

# ---------------------------------
# 快速鍵提示
# ---------------------------------
# <prefix> + ?: 顯示所有快捷鍵
