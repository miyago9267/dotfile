# coralline theme: p10k-lean
# Pairs with VL_LEAN=1 — VL_BG_* act as per-segment TEXT colors (transparent bg),
# values copied verbatim from ~/.p10k.zsh lean style.
VL_BG_DIR=31           # POWERLEVEL9K_DIR_FOREGROUND
VL_BG_GIT_OK=76        # POWERLEVEL9K_VCS_CLEAN_FOREGROUND
VL_BG_GIT_DIRTY=178    # POWERLEVEL9K_VCS_MODIFIED_FOREGROUND
VL_BG_MODEL=39         # POWERLEVEL9K_DIR_ANCHOR_FOREGROUND
VL_BG_CTX=240          # gauges color their own text; this is frame gray
VL_BG_5H=240
VL_BG_7D=240
VL_BG_COST=101
VL_BG_CLOCK=66         # POWERLEVEL9K_TIME_FOREGROUND
VL_BG_LINES=240        # p10k frame/ruler gray
VL_BG_STYLE=103        # POWERLEVEL9K_DIR_SHORTENED_FOREGROUND
VL_BG_DURATION=101     # POWERLEVEL9K_COMMAND_EXECUTION_TIME_FOREGROUND

VL_FG_DIM=245
VL_FG_OK=76
VL_FG_WARN=178
VL_FG_HOT=160          # POWERLEVEL9K_STATUS_ERROR_FOREGROUND
