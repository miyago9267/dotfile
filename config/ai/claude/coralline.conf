# coralline config — generated 2026-06-12, mirroring ~/.p10k.zsh (lean, 24h clock w/ seconds)
. ~/.claude/coralline/themes/p10k-lean.conf

VL_LEAN=1                # transparent bg, colored text — matches p10k lean style
VL_LAYOUT="auto"         # p10k keeps one content line, right side auto-hides
VL_MAX_LINES=2
VL_SEGMENTS="dir git model ctx limit5h limit7d duration clock"
VL_SEGMENTS2=""
VL_SEGMENTS3=""
VL_CLOCK="24h"           # POWERLEVEL9K_TIME_FORMAT='%D{%H:%M:%S}'
VL_CLOCK_SECONDS=1
VL_BAR_WIDTH=5
VL_COST_DECIMALS=2
VL_PATH_DEPTH=4
VL_ASCII=0               # POWERLEVEL9K_MODE=nerdfont-complete
